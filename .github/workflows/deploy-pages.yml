name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js export)
        env:
          GITHUB_ACTIONS: "true"
          NEXT_PUBLIC_BASE_PATH: "/coffe_2048"
          NEXT_PUBLIC_ASSET_VERSION: ${{ github.sha }}
          NEXT_PUBLIC_ENABLE_DEV_DEBUG: "true"
          NEXT_PUBLIC_REWARDED_AD_PROVIDER: "web-gpt-rewarded"
          NEXT_PUBLIC_GAM_REWARDED_OFFLINE_AD_UNIT_PATH: "/23350518234/rewarded_offline_double"
          NEXT_PUBLIC_GAM_REWARDED_PUZZLE_AD_UNIT_PATH: "/23350518234/rewarded_puzzle_double"
          NEXT_PUBLIC_GAM_REWARDED_SCRIPT_URL: "https://securepubads.g.doubleclick.net/tag/js/gpt.js"
          NEXT_PUBLIC_REWARDED_AD_REQUEST_TIMEOUT_MS: "8000"
        run: npm run build

      - name: Verify exported audio assets
        run: test -f out/bgm/lobby.mp3 && test -f out/sfx/click.mp3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

